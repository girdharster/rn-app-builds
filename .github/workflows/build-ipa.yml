name: Build iOS IPA (Enterprise)

on:
  workflow_dispatch:
    inputs:
      app_id:
        description: "App ID"
        required: true
      app_name:
        description: "App Name"
        required: true

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install app dependencies
        working-directory: apps/${{ github.event.inputs.app_id }}
        run: |
          node -e "
          const fs = require('fs');
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const rnVer = pkg.dependencies['react-native'];
          pkg.overrides = Object.assign(pkg.overrides || {}, { 'react-native': rnVer });
          fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          "
          npm install --legacy-peer-deps
          echo "Installed RN: $(node -e \"console.log(require('./node_modules/react-native/package.json').version)\")"

      - name: Expo Prebuild (iOS)
        working-directory: apps/${{ github.event.inputs.app_id }}
        run: |
          npx expo prebuild --platform ios --no-install 2>&1 || true
          ls ios/ 2>/dev/null || (echo "prebuild failed" && exit 1)

      - name: Install CocoaPods
        working-directory: apps/${{ github.event.inputs.app_id }}/ios
        run: pod install

      - name: Setup signing
        working-directory: apps/${{ github.event.inputs.app_id }}
        run: |
          set -e

          # Create temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -hex 16)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Decode and import certificate
          echo "" | base64 --decode > $RUNNER_TEMP/cert.p12
          security import $RUNNER_TEMP/cert.p12 -P "1234567" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          echo "Certificate imported"

          # Decode and install provisioning profile
          echo "" | base64 --decode > $RUNNER_TEMP/profile.mobileprovision
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $RUNNER_TEMP/profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/e4579292-6256-42d9-bf02-a7fce6957463.mobileprovision
          echo "Profile installed: e4579292-6256-42d9-bf02-a7fce6957463"

          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV

      - name: Patch Xcode project for enterprise signing
        working-directory: apps/${{ github.event.inputs.app_id }}
        run: |
          PBXPROJ=$(find ios -name "project.pbxproj" | head -1)
          echo "Patching: $PBXPROJ"

          sed -i '' 's/CODE_SIGN_IDENTITY = ".*"/CODE_SIGN_IDENTITY = "iPhone Distribution"/g' "$PBXPROJ"
          sed -i '' 's/DEVELOPMENT_TEAM = ".*"/DEVELOPMENT_TEAM = "32M9V9VLQY"/g' "$PBXPROJ"
          sed -i '' 's/"DEVELOPMENT_TEAM" = ".*"/"DEVELOPMENT_TEAM" = "32M9V9VLQY"/g' "$PBXPROJ"
          sed -i '' 's/PROVISIONING_PROFILE_SPECIFIER = ".*"/PROVISIONING_PROFILE_SPECIFIER = "Appypiellc 33"/g' "$PBXPROJ"
          sed -i '' 's/CODE_SIGN_STYLE = Automatic/CODE_SIGN_STYLE = Manual/g' "$PBXPROJ"
          sed -i '' 's/PRODUCT_BUNDLE_IDENTIFIER = ".*"/PRODUCT_BUNDLE_IDENTIFIER = "com.appypiellc.appypiellc"/g' "$PBXPROJ"

          echo "Xcode project patched"

      - name: Build archive
        working-directory: apps/${{ github.event.inputs.app_id }}
        run: |
          WORKSPACE=$(find ios -name "*.xcworkspace" -not -path "*/Pods/*" | head -1)
          # Get the app scheme (not a pod scheme like 'boost')
          APP_NAME=$(node -e "const a=require('./app.json');console.log(a.expo.name.replace(/[^a-zA-Z0-9]/g,''))")
          ALL_SCHEMES=$(xcodebuild -list -workspace "$WORKSPACE" -json 2>/dev/null | node -e "const d=require('fs').readFileSync('/dev/stdin','utf8');const j=JSON.parse(d);console.log(j.workspace.schemes.join(','))")
          echo "Available schemes: $ALL_SCHEMES"
          # Use the app name as scheme (expo prebuild creates it), fallback to first non-pod scheme
          SCHEME=$(echo "$ALL_SCHEMES" | tr ',' '\n' | grep -i "$APP_NAME" | head -1)
          if [ -z "$SCHEME" ]; then
            SCHEME=$(echo "$ALL_SCHEMES" | tr ',' '\n' | grep -v -E "^(boost|Pods-|React|hermes|jsi)" | head -1)
          fi
          echo "Building workspace: $WORKSPACE scheme: $SCHEME"

          xcodebuild archive \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -archivePath $RUNNER_TEMP/app.xcarchive \
            -destination "generic/platform=iOS" \
            CODE_SIGN_IDENTITY="iPhone Distribution" \
            DEVELOPMENT_TEAM="32M9V9VLQY" \
            PROVISIONING_PROFILE_SPECIFIER="Appypiellc 33" \
            CODE_SIGN_STYLE=Manual \
            PRODUCT_BUNDLE_IDENTIFIER="com.appypiellc.appypiellc" \
            -allowProvisioningUpdates \
            | tail -20

      - name: Create IPA from archive
        run: |
          set -e
          ARCHIVE=$RUNNER_TEMP/app.xcarchive

          # Debug: show archive structure
          echo "Archive structure:"
          find "$ARCHIVE" -name "*.app" -type d 2>/dev/null | head -5

          # Find the .app anywhere in the archive
          APP_PATH=$(find "$ARCHIVE" -name "*.app" -type d -not -path "*/Frameworks/*" | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: No .app found in archive"
            find "$ARCHIVE" -maxdepth 3 -type d
            exit 1
          fi
          APP_NAME=$(basename "$APP_PATH")
          echo "Found app: $APP_NAME at $APP_PATH"

          # Embed provisioning profile inside .app
          cp ~/Library/MobileDevice/Provisioning\ Profiles/e4579292-6256-42d9-bf02-a7fce6957463.mobileprovision "$APP_PATH/embedded.mobileprovision"
          echo "Profile embedded"

          # Extract entitlements from provisioning profile
          security cms -D -i "$APP_PATH/embedded.mobileprovision" > /tmp/prov.plist
          /usr/libexec/PlistBuddy -x -c "Print :Entitlements" /tmp/prov.plist > /tmp/entitlements.plist
          echo "Entitlements extracted"

          # Re-sign frameworks first (if any)
          if [ -d "$APP_PATH/Frameworks" ]; then
            find "$APP_PATH/Frameworks" -name "*.framework" -type d | while read fw; do
              /usr/bin/codesign --force --sign "iPhone Distribution: Appy Pie LLC" "$fw"
            done
            find "$APP_PATH/Frameworks" -name "*.dylib" -type f | while read dl; do
              /usr/bin/codesign --force --sign "iPhone Distribution: Appy Pie LLC" "$dl"
            done
            echo "Frameworks re-signed"
          fi

          # Re-sign the main app
          /usr/bin/codesign --force --sign "iPhone Distribution: Appy Pie LLC" \
            --entitlements /tmp/entitlements.plist \
            "$APP_PATH"
          echo "App re-signed"

          # Create IPA (standard Payload/ structure)
          mkdir -p $RUNNER_TEMP/ipa-output/Payload
          cp -r "$APP_PATH" $RUNNER_TEMP/ipa-output/Payload/
          cd $RUNNER_TEMP/ipa-output
          zip -r -q app-enterprise.ipa Payload/
          ls -la app-enterprise.ipa
          echo "IPA created successfully!"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: app-enterprise-${{ github.event.inputs.app_id }}
          path: ${{ runner.temp }}/ipa-output/app-enterprise.ipa
          retention-days: 30

      - name: Cleanup keychain
        if: always()
        run: |
          if [ -n "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
          fi
