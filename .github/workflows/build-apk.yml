name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      app_id:
        description: 'App ID (folder name under apps/)'
        required: true
      app_name:
        description: 'Human-readable app name'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install app dependencies
        working-directory: apps/${{ github.event.inputs.app_id }}
        run: npm install --legacy-peer-deps

      - name: Expo Prebuild
        working-directory: apps/${{ github.event.inputs.app_id }}
        run: npx expo prebuild --platform android --no-install
        env:
          EXPO_NO_TELEMETRY: 1

      - name: Pre-generate PackageList.java and patch build.gradle
        working-directory: apps/${{ github.event.inputs.app_id }}
        run: |
          set -e

          # Detect package name from app.json
          PACKAGE_NAME=$(node -e "const a=require('./app.json'); console.log(a.expo.android.package)")
          echo "Package name: $PACKAGE_NAME"

          # Create the generated output directory
          AUTOLINKING_DIR="android/app/build/generated/autolinking/src/main/java/com/facebook/react"
          mkdir -p "$AUTOLINKING_DIR"

          # Write PackageList.java
          node -e "
          const fs = require('fs');
          const dir = '$AUTOLINKING_DIR';
          const content = `package com.facebook.react;

          import android.app.Application;
          import android.content.Context;
          import android.content.res.Resources;
          import com.facebook.react.ReactPackage;
          import com.facebook.react.shell.MainPackageConfig;
          import com.facebook.react.shell.MainReactPackage;
          import java.util.Arrays;
          import java.util.ArrayList;
          import com.swmansion.gesturehandler.RNGestureHandlerPackage;
          import com.swmansion.reanimated.ReanimatedPackage;
          import com.th3rdwave.safeareacontext.SafeAreaContextPackage;
          import com.swmansion.rnscreens.RNScreensPackage;
          import com.horcrux.svg.SvgPackage;

          public class PackageList {
            private Application application;
            private ReactNativeHost reactNativeHost;
            private ReactInstanceManager reactInstanceManager;
            private MainPackageConfig mConfig;

            public PackageList(ReactInstanceManager reactInstanceManager) {
              this(reactInstanceManager.getCurrentReactContext().getApplicationContext());
              this.reactInstanceManager = reactInstanceManager;
              reactNativeHost = null;
            }

            public PackageList(Application application) {
              this(application, null);
              reactNativeHost = null;
            }

            public PackageList(ReactNativeHost reactNativeHost) {
              this(reactNativeHost.getApplication(), reactNativeHost.getUseDeveloperSupport() ? MainPackageConfig.builder().build() : null);
              this.reactNativeHost = reactNativeHost;
            }

            public PackageList(Application application, MainPackageConfig hardcodedConfig) {
              this.application = application;
              mConfig = hardcodedConfig;
            }

            private ReactNativeHost getReactNativeHost() {
              return reactNativeHost;
            }

            private Resources getResources() {
              return getApplication().getResources();
            }

            private Application getApplication() {
              if (this.reactNativeHost == null) return this.application;
              return this.reactNativeHost.getApplication();
            }

            private Context getApplicationContext() {
              return getApplication().getApplicationContext();
            }

            public ArrayList<ReactPackage> getPackages() {
              return new ArrayList<>(Arrays.asList(
                new MainReactPackage(mConfig),
                new RNGestureHandlerPackage(),
                new ReanimatedPackage(),
                new SafeAreaContextPackage(),
                new RNScreensPackage(),
                new SvgPackage()
              ));
            }
          }
          `;
          fs.writeFileSync(dir + '/PackageList.java', content);
          console.log('PackageList.java written to ' + dir);
          "

          echo "=== PackageList.java ==="
          cat "$AUTOLINKING_DIR/PackageList.java"

          # Patch android/app/build.gradle to disable autolinking tasks
          printf '\n// Disable autolinking — PackageList.java is pre-generated\nafterEvaluate {\n    project.tasks.matching { it.name.startsWith("generate") && it.name.endsWith("AutolinkingPackageList") }.configureEach {\n        enabled = false\n    }\n}\n' >> android/app/build.gradle

          echo "=== Last 15 lines of build.gradle ==="
          tail -15 android/app/build.gradle

      - name: Build APK
        working-directory: apps/${{ github.event.inputs.app_id }}/android
        run: ./gradlew assembleDebug --no-daemon -Dorg.gradle.jvmargs="-Xmx4g"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: app-debug-apk
          path: apps/${{ github.event.inputs.app_id }}/android/app/build/outputs/apk/debug/*.apk
          retention-days: 7
