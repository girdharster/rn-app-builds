name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      app_id:
        description: 'App ID (folder name under apps/)'
        required: true
      app_name:
        description: 'Human-readable app name'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install app dependencies
        working-directory: apps/${{ github.event.inputs.app_id }}
        run: |
          npm install --legacy-peer-deps
          echo "Installed RN: $(node -e "console.log(require('./node_modules/react-native/package.json').version)")"

      - name: Expo Prebuild
        working-directory: apps/${{ github.event.inputs.app_id }}
        run: npx expo prebuild --platform android --no-install
        env:
          EXPO_NO_TELEMETRY: 1

      - name: Patch build environment
        working-directory: apps/${{ github.event.inputs.app_id }}
        run: |
          set -e

          # 1. Pre-generate PackageList.java (bypasses RNGP autolinking)
          AUTOLINKING_DIR="android/app/build/generated/autolinking/src/main/java/com/facebook/react"
          mkdir -p "$AUTOLINKING_DIR"
          printf '%s' '' | base64 -d > "$AUTOLINKING_DIR/PackageList.java"
          echo "PackageList.java written ($(wc -c < "$AUTOLINKING_DIR/PackageList.java") bytes)"

          # 2. Fix minSdkVersion (RN 0.75+ requires minSdk 24)
          echo "android.minSdkVersion=24" >> android/gradle.properties
          echo "minSdkVersion=24 set in gradle.properties"

          # 3. Ensure launcher icon resources exist
          MAIN_RES="android/app/src/main/res"
          mkdir -p "$MAIN_RES/drawable"

          if [ ! -f "$MAIN_RES/drawable/ic_launcher_background.xml" ]; then
            printf '<?xml version="1.0" encoding="utf-8"?><shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="rectangle"><solid android:color="#ffffff"/></shape>' > "$MAIN_RES/drawable/ic_launcher_background.xml"
            echo "Created ic_launcher_background.xml"
          fi

          for DENSITY in mipmap-mdpi mipmap-hdpi mipmap-xhdpi mipmap-xxhdpi mipmap-xxxhdpi; do
            mkdir -p "$MAIN_RES/$DENSITY"
            for ICON in ic_launcher.png ic_launcher_round.png ic_launcher_foreground.png; do
              if [ ! -f "$MAIN_RES/$DENSITY/$ICON" ]; then
                printf '%s' 'iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAIAAACQd1PeAAAADElEQVR4nGP4//8/AAX+Av4N70a4AAAAAElFTkSuQmCC' | base64 -d > "$MAIN_RES/$DENSITY/$ICON"
              fi
            done
          done
          echo "Launcher icons ensured."

          # 4. Disable generateAutolinkingPackageList Gradle task
          python3 -c "
          with open('android/app/build.gradle', 'a') as f:
              f.write('''

          // Disable autolinking - PackageList.java is pre-generated
          afterEvaluate {
              project.tasks.matching { it.name.startsWith(\"generate\") && it.name.endsWith(\"AutolinkingPackageList\") }.configureEach {
                  enabled = false
              }
          }
          ''')
          print('build.gradle patched')
          "

      - name: Build APK
        working-directory: apps/${{ github.event.inputs.app_id }}/android
        run: ./gradlew assembleDebug --no-daemon -Dorg.gradle.jvmargs="-Xmx4g"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: app-debug-apk
          path: apps/${{ github.event.inputs.app_id }}/android/app/build/outputs/apk/debug/*.apk
          retention-days: 7
