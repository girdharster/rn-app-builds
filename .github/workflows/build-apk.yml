name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      app_id:
        description: "App ID"
        required: true
      app_name:
        description: "App Name"
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install app dependencies
        working-directory: apps/${{ github.event.inputs.app_id }}
        run: |
          RN_VERSION=$(node -e "console.log(require('./package.json').dependencies['react-native'])")
          echo "Pinning react-native to: $RN_VERSION"
          node -e "
          const fs = require('fs');
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const rnVer = pkg.dependencies['react-native'];
          pkg.overrides = Object.assign(pkg.overrides || {}, { 'react-native': rnVer });
          fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          console.log('Added npm override for react-native:', rnVer);
          "
          npm install --legacy-peer-deps
          echo "Installed RN: $(node -e "console.log(require('./node_modules/react-native/package.json').version)")"

      - name: Expo Prebuild
        working-directory: apps/${{ github.event.inputs.app_id }}
        run: |
          npx expo prebuild --platform android --no-install 2>&1 || true
          ls android/ 2>/dev/null || (echo "prebuild failed" && exit 1)

      - name: Patch build environment
        working-directory: apps/${{ github.event.inputs.app_id }}
        run: |
          set -e

          # 1. Pre-generate PackageList.java (bypasses RNGP autolinking)
          AUTOLINKING_DIR="android/app/build/generated/autolinking/src/main/java/com/facebook/react"
          mkdir -p "$AUTOLINKING_DIR"
          cp "$GITHUB_WORKSPACE/android-templates/PackageList.java" "$AUTOLINKING_DIR/PackageList.java"
          echo "PackageList.java copied from template."

          # 2. Fix minSdkVersion (RN 0.75+ requires minSdk 24)
          echo "android.minSdkVersion=24" >> android/gradle.properties
          echo "minSdkVersion=24 set"

          # 2b. Ensure splashscreen_background color exists (expo prebuild references it but may not create it)
          mkdir -p "android/app/src/main/res/values"
          if [ ! -f "android/app/src/main/res/values/colors.xml" ]; then
            printf '<?xml version="1.0" encoding="utf-8"?>\n<resources>\n  <color name="splashscreen_background">#ffffff</color>\n</resources>\n' > android/app/src/main/res/values/colors.xml
            echo "Created colors.xml with splashscreen_background"
          elif ! grep -q "splashscreen_background" android/app/src/main/res/values/colors.xml; then
            sed -i 's|</resources>|  <color name="splashscreen_background">#ffffff</color>\n</resources>|' android/app/src/main/res/values/colors.xml
            echo "Added splashscreen_background to existing colors.xml"
          fi

          # 3. Ensure launcher icon resources exist
          MAIN_RES="android/app/src/main/res"
          mkdir -p "$MAIN_RES/drawable"
          if [ ! -f "$MAIN_RES/drawable/ic_launcher_background.xml" ]; then
            printf '<?xml version="1.0" encoding="utf-8"?><shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="rectangle"><solid android:color="#ffffff"/></shape>' > "$MAIN_RES/drawable/ic_launcher_background.xml"
            echo "Created ic_launcher_background.xml"
          fi
          for DENSITY in mipmap-mdpi mipmap-hdpi mipmap-xhdpi mipmap-xxhdpi mipmap-xxxhdpi; do
            mkdir -p "$MAIN_RES/$DENSITY"
            for ICON in ic_launcher.png ic_launcher_round.png ic_launcher_foreground.png; do
              if [ ! -f "$MAIN_RES/$DENSITY/$ICON" ]; then
                printf '%s' 'iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAIAAACQd1PeAAAADElEQVR4nGP4//8/AAX+Av4N70a4AAAAAElFTkSuQmCC' | base64 -d > "$MAIN_RES/$DENSITY/$ICON"
              fi
            done
          done
          echo "Launcher icons ensured."

          # 4. Disable generateAutolinkingPackageList Gradle task
          printf '\nafterEvaluate {\n    project.tasks.matching { t -> t.name.startsWith("generate") && t.name.endsWith("AutolinkingPackageList") }.configureEach { enabled = false }\n}\n' >> android/app/build.gradle
          echo "build.gradle patched"

      - name: Build APK
        working-directory: apps/${{ github.event.inputs.app_id }}/android
        run: |
          ./gradlew assembleDebug --no-daemon -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=512m"


      - name: Sign APK with production keystore
        working-directory: apps/${{ github.event.inputs.app_id }}/android
        run: |
          set -e

          # Decode production keystore (appypie.keystore, alias: appypie)
          printf '%s' '' | base64 -d > /tmp/appypie.keystore
          echo "Keystore decoded, size: $(wc -c < /tmp/appypie.keystore) bytes"

          # Find apksigner from latest installed build-tools
          APKSIGNER=$(ls $ANDROID_HOME/build-tools/*/apksigner 2>/dev/null | sort -V | tail -1)
          echo "Using apksigner: $APKSIGNER"

          APK_IN="app/build/outputs/apk/debug/app-debug.apk"
          APK_OUT="app/build/outputs/apk/debug/app-signed.apk"

          "$APKSIGNER" sign \
            --ks /tmp/appypie.keystore \
            --ks-key-alias appypie \
            --ks-pass pass:appypie123 \
            --key-pass pass:appypie123 \
            --out "$APK_OUT" \
            "$APK_IN"

          echo "APK signed successfully"
          "$APKSIGNER" verify --verbose "$APK_OUT" | head -5

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: app-signed-${{ github.event.inputs.app_id }}
          path: apps/${{ github.event.inputs.app_id }}/android/app/build/outputs/apk/debug/app-signed.apk
          retention-days: 7
