name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      app_id:
        description: 'App ID (folder name under apps/)'
        required: true
      app_name:
        description: 'Human-readable app name'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install app dependencies
        working-directory: apps/${{ github.event.inputs.app_id }}
        run: npm install --legacy-peer-deps

      - name: Expo Prebuild
        working-directory: apps/${{ github.event.inputs.app_id }}
        run: npx expo prebuild --platform android --no-install
        env:
          EXPO_NO_TELEMETRY: 1

      - name: Pre-generate PackageList.java and patch build.gradle
        working-directory: apps/${{ github.event.inputs.app_id }}
        run: |
          set -e
          AUTOLINKING_DIR="android/app/build/generated/autolinking/src/main/java/com/facebook/react"
          mkdir -p "$AUTOLINKING_DIR"

          # Decode PackageList.java from base64 (avoids all shell quoting issues)
          echo "" | base64 -d > "$AUTOLINKING_DIR/PackageList.java"
          echo "=== PackageList.java written ==="
          head -5 "$AUTOLINKING_DIR/PackageList.java"

          # Patch build.gradle to disable autolinking task using Python (no quoting issues)
          python3 -c "
          import sys
          patch = '''

          // Disable autolinking task - PackageList.java is pre-generated
          afterEvaluate {
              project.tasks.matching { it.name.startsWith(\"generate\") && it.name.endsWith(\"AutolinkingPackageList\") }.configureEach {
                  enabled = false
              }
          }
          '''
          with open('android/app/build.gradle', 'a') as f:
              f.write(patch)
          print('build.gradle patched')
          "
          echo "=== Last 15 lines of build.gradle ==="
          tail -15 android/app/build.gradle

      - name: Build APK
        working-directory: apps/${{ github.event.inputs.app_id }}/android
        run: ./gradlew assembleDebug --no-daemon -Dorg.gradle.jvmargs="-Xmx4g"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: app-debug-apk
          path: apps/${{ github.event.inputs.app_id }}/android/app/build/outputs/apk/debug/*.apk
          retention-days: 7
