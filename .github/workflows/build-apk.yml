name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      app_id:
        description: 'App ID to build'
        required: true
      app_name:
        description: 'App display name'
        required: true
        default: 'MyApp'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        working-directory: apps/${{ github.event.inputs.app_id }}
        run: npm install --legacy-peer-deps

      - name: Expo Prebuild
        working-directory: apps/${{ github.event.inputs.app_id }}
        run: npx expo prebuild --platform android
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'

      - name: Mock react-native config (bypass RNGP autolinking crash)
        working-directory: apps/${{ github.event.inputs.app_id }}
        run: |
          PACKAGE=$(node -e "const app = require('./app.json'); console.log(app.expo.android.package)")
          ROOT=$(pwd)
          echo "" | base64 -d > /tmp/gen-rn-config.js
          node /tmp/gen-rn-config.js "$PACKAGE" "$ROOT"
          echo "Y29uc3QgYXJncyA9IHByb2Nlc3MuYXJndi5zbGljZSgyKTsKaWYgKGFyZ3NbMF0gPT09ICdjb25maWcnKSB7CiAgcHJvY2Vzcy5zdGRvdXQud3JpdGUocmVxdWlyZSgnZnMnKS5yZWFkRmlsZVN5bmMoJy90bXAvcm4tY29uZmlnLmpzb24nLCAndXRmOCcpKTsKICBwcm9jZXNzLmV4aXQoMCk7Cn0KLy8gcGFzcy10aHJvdWdoIHRvIG9yaWdpbmFsIGZvciBvdGhlciBjb21tYW5kcwo=" | base64 -d > /tmp/mock-cli.js
          for f in $(find node_modules -name "bin.js" -path "*/@react-native-community/cli/*" 2>/dev/null); do
            cp "$f" "$f.orig" && cp /tmp/mock-cli.js "$f" && echo "Patched: $f"
          done
          if [ -f "node_modules/react-native/cli.js" ]; then
            cp node_modules/react-native/cli.js node_modules/react-native/cli.js.orig
            cp /tmp/mock-cli.js node_modules/react-native/cli.js
            echo "Patched: react-native/cli.js"
          fi

      - name: Make gradlew executable
        working-directory: apps/${{ github.event.inputs.app_id }}/android
        run: chmod +x gradlew

      - name: Build APK
        working-directory: apps/${{ github.event.inputs.app_id }}/android
        run: ./gradlew assembleDebug --no-daemon
        env:
          GRADLE_OPTS: '-Dorg.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m'

      - name: Find and upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-${{ github.event.inputs.app_id }}-debug
          path: apps/${{ github.event.inputs.app_id }}/android/app/build/outputs/apk/debug/*.apk
          retention-days: 7
